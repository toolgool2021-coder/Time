<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таймер - Toolgool</title>

    <!-- Метатеги для отключения кэша -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link rel="stylesheet" href="style.css?v=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<canvas id="snowCanvas"></canvas>

<div class="container">
    <div class="timer-section">
        <div class="header">
            <h1 class="title">⏱️ ТАЙМЕР</h1>
            <p class="subtitle">@Toolgool</p>
        </div>

        <div class="timer-box" id="timerBox">
            <div class="timer-display">
                <div class="time-unit">
                    <span class="time-value" id="days">00</span>
                    <span class="time-label">ДНИ</span>
                </div>
                <span class="separator">:</span>
                <div class="time-unit">
                    <span class="time-value" id="hours">00</span>
                    <span class="time-label">ЧАСЫ</span>
                </div>
                <span class="separator">:</span>
                <div class="time-unit">
                    <span class="time-value" id="minutes">00</span>
                    <span class="time-label">МИН</span>
                </div>
                <span class="separator">:</span>
                <div class="time-unit">
                    <span class="time-value" id="seconds">00</span>
                    <span class="time-label">СЕК</span>
                </div>
            </div>
        </div>

        <div class="no-timer" id="noTimer">
            <p>💤 Нету таймеров 💤</p>
        </div>

        <div class="controls">
            <button id="refreshBtn" class="btn btn-refresh">
                <i class="fas fa-sync-alt"></i> Обновить
            </button>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="footer-container">
        <div class="footer-text">
            <p>&copy; 2024-2026 Toolgool. All rights reserved.</p>
        </div>
    </div>
</footer>

</body>
