<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таймер - Toolgool</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="snowCanvas"></canvas>

<div class="container">
    <div class="timer-section">
        
        <!-- Заголовок -->
        <div class="header">
            <h1 class="title">⏱️ ТАЙМЕР</h1>
            <p class="subtitle">@Toolgool</p>
        </div>

        <!-- Основной таймер -->
        <div class="timer-box" id="timerBox">
            <div class="timer-display">
                <div class="time-unit">
                    <span class="time-value" id="days">00</span>
                    <span class="time-label">ДНИ</span>
                </div>
                <span class="separator">:</span>
                <div class="time-unit">
                    <span class="time-value" id="hours">00</span>
                    <span class="time-label">ЧАСЫ</span>
                </div>
                <span class="separator">:</span>
                <div class="time-unit">
                    <span class="time-value" id="minutes">00</span>
                    <span class="time-label">МИН</span>
                </div>
                <span class="separator">:</span>
                <div class="time-unit">
                    <span class="time-value" id="seconds">00</span>
                    <span class="time-label">СЕК</span>
                </div>
            </div>
        </div>

        <!-- Сообщение об отсутствии таймеров -->
        <div class="no-timer" id="noTimer">
            <p>💤 Нету таймеров 💤</p>
        </div>

        <!-- Кнопка обновления -->
        <div class="controls">
            <button id="refreshBtn" class="btn btn-refresh">
                <i class="fas fa-sync-alt"></i> Обновить
            </button>
        </div>

    </div>
</div>
